name: scan-and-deploy

on:
  schedule:
    - cron: "17 * * * *"   # ogni ora al minuto 17 (evita i picchi di carico di GitHub)
  push:
    branches: [main]
    paths-ignore:
      - "data/**"          # i commit-dati del bot non devono ri-innescare il workflow
  workflow_dispatch: {}

permissions:
  contents: write          # persistenza del registro segnali (data/signals.json)
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true   # l'ultima scansione vince: mai accodarsi a run bloccate

jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Esegui scanner (fonti pubbliche, zero dipendenze)
        run: |
          mkdir -p _site/data
          python scanner/scan.py --out _site/data

      - name: Persisti registro segnali nel repo (solo su cambi strutturali)
        continue-on-error: true
        run: |
          if ! git diff --quiet -- data/signals.json || \
             [ -n "$(git status --porcelain data/signals.json)" ]; then
            git config user.name "alpha-radar-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/signals.json
            git commit -m "data: registro segnali aggiornato [skip ci]"
            for i in 1 2 3; do
              git push && break
              git pull --rebase && sleep 3
            done
          else
            echo "registro invariato: nessun commit"
          fi

      - name: Assembla sito statico
        run: cp -r site/index.html site/app.js site/style.css _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
